name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build and Push Docker Image
      run: |
        # Define tags
        IMAGE_NAME=${{ secrets.ACR_NAME }}.azurecr.io/project-idea-automation
        
        # Build image
        docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .
        
        # Push image
        docker push $IMAGE_NAME:${{ github.sha }}
        docker push $IMAGE_NAME:latest

    - name: Deploy to Azure Container Instances (ACI)
      uses: azure/aci-deploy@v1
      with:
        resource-group: IdeaAutomationRG
        dns-name-label: project-idea-automation-${{ github.repository_owner }}
        image: ${{ secrets.ACR_NAME }}.azurecr.io/project-idea-automation:latest
        registry-login-server: ${{ secrets.ACR_NAME }}.azurecr.io
        registry-username: ${{ secrets.ACR_USERNAME }}
        registry-password: ${{ secrets.ACR_PASSWORD }}
        name: project-idea-automation-service
        location: eastus
        secure-environment-variables: |
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL=${{ secrets.SMTP_USER }}
          RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER=smtp.gmail.com
          SMTP_PORT=587
